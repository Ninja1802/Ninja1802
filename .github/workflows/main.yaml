name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 IMPORTANT FIX

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Ninja1802
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push Snake
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
